name: Python SDK Staging Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

env:
  PYTHON_VERSION: "3.11"
  HONUA_ENABLE_WRITE_SMOKE: "true"
  HONUA_SMOKE_RESULTS_PATH: "staging-smoke-results.json"
  HONUA_SMOKE_UID_PREFIX: "sdk-python-smoke-${{ github.run_id }}-${{ github.run_attempt }}"

jobs:
  staging-smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: staging
    env:
      HONUA_BASE_URL: ${{ vars.HONUA_BASE_URL }}
      HONUA_SERVICE_ID: ${{ vars.HONUA_SERVICE_ID }}
      HONUA_LAYER_ID: ${{ vars.HONUA_LAYER_ID }}
      HONUA_API_KEY: ${{ secrets.HONUA_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: packages/honua-sdk/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/honua-sdk
          pip install pytest

      - name: Validate staging smoke configuration
        id: smoke-config
        run: |
          if [[ -n "${HONUA_BASE_URL}" ]]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "## Python SDK staging smoke"
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              echo '- Skipped because `HONUA_BASE_URL` is not configured for GitHub Actions.'
            else
              echo '- Failed because `HONUA_BASE_URL` is not configured for GitHub Actions.'
            fi
            echo '- Set `HONUA_BASE_URL` in the repo or the `staging` environment before running the live smoke lane.'
            echo '- `HONUA_SERVICE_ID` and `HONUA_LAYER_ID` are optional and default to `test_service` / `0`.'
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "HONUA_BASE_URL is required for staging smoke runs." >&2
          exit 1

      - name: Run staging smoke suite
        if: ${{ steps.smoke-config.outputs.configured == 'true' }}
        run: |
          python -m pytest tests/integration \
            -q \
            --run-integration \
            -m "integration and staging and smoke" \
            --tb=short \
            --junitxml=staging-smoke-junit.xml

      - name: Write smoke summary
        if: ${{ always() && steps.smoke-config.outputs.configured == 'true' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from scripts._smoke_harness import load_smoke_report, render_smoke_summary

          report_path = Path(os.environ["HONUA_SMOKE_RESULTS_PATH"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          if report_path.exists():
              summary_path.write_text(
                  render_smoke_summary(load_smoke_report(report_path)),
                  encoding="utf-8",
              )
          else:
              summary_path.write_text(
                  "## Python SDK staging smoke\n"
                  "- Smoke report was not produced.\n"
                  "- Check the pytest log and JUnit artifact for the first failing step.\n",
                  encoding="utf-8",
              )
          PY

      - name: Upload staging smoke artifacts
        if: ${{ always() && steps.smoke-config.outputs.configured == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: python-sdk-staging-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            staging-smoke-junit.xml
            ${{ env.HONUA_SMOKE_RESULTS_PATH }}
