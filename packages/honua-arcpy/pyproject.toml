[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "honua-arcpy"
version = "0.1.0"
description = "Deprecated -- backward-compatibility shim that re-exports the renamed honua-gp package"
readme = "README.md"
license = { text = "Proprietary -- see LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Honua" }]
keywords = ["deprecated", "honua", "honua-gp", "migration", "compatibility"]
classifiers = [
  "Development Status :: 7 - Inactive",
  "Intended Audience :: Developers",
  "License :: Other/Proprietary License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: GIS",
  "Private :: Do Not Upload",
]
dependencies = [
  "honua-gp>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/honua-io"
Repository = "https://github.com/honua-io/honua-sdk-python"
Issues = "https://github.com/honua-io/honua-sdk-python/issues"

[tool.hatch.build.targets.wheel]
packages = ["honua_arcpy"]

[tool.hatch.build.targets.sdist]
include = [
  "honua_arcpy",
  "README.md",
  "LICENSE",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
