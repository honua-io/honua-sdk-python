name: Python SDK CI

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYTHONDONTWRITEBYTECODE: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/honua-sdk/pyproject.toml
            packages/honua-admin/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/honua-sdk[grpc]"
          pip install -e "packages/honua-admin"
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            packages/honua-sdk/pyproject.toml
            packages/honua-admin/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/honua-sdk[grpc]"
          pip install -e "packages/honua-admin"

      - name: Run compatibility gate
        run: python scripts/compatibility_gate.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            packages/honua-sdk/pyproject.toml
            packages/honua-admin/pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine

      - name: Build honua-sdk
        run: hatch build
        working-directory: packages/honua-sdk

      - name: Check honua-sdk distribution
        run: twine check dist/*
        working-directory: packages/honua-sdk

      - name: Build honua-admin
        run: hatch build
        working-directory: packages/honua-admin

      - name: Check honua-admin distribution
        run: twine check dist/*
        working-directory: packages/honua-admin
