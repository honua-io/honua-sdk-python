[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "honua-sdk"
version = "0.0.1a0"
description = "Python SDK scaffold for Honua Server"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
]

[project.optional-dependencies]
admin = []  # no extra deps needed, uses httpx from core
grpc = ["grpcio>=1.66", "protobuf>=5.27"]

[tool.pytest.ini_options]
testpaths = ["tests"]
