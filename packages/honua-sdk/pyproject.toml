[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "honua-sdk"
version = "0.1.7"
description = "Python SDK for Honua geospatial server -- feature queries, geocoding, and protocol clients"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Honua" }]
keywords = ["geospatial", "mobile", "gis", "offline", "sync", "grpc", "honua"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: GIS",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27.0",
]

[project.scripts]
honua = "honua_sdk.cli:main"
honua-migrate = "honua_sdk.migration._cli:main"

[project.urls]
Homepage = "https://github.com/honua-io"
Repository = "https://github.com/honua-io/honua-sdk-python"
Issues = "https://github.com/honua-io/honua-sdk-python/issues"

[project.optional-dependencies]
grpc = ["grpcio>=1.70.0", "protobuf>=5.27"]
geopandas = ["geopandas>=0.14.0", "shapely>=2.0.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
