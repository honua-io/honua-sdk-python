name: Security

on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

jobs:
  trivy:
    uses: honua-io/.github/.github/workflows/reusable-trivy.yml@main
    with:
      scan-type: fs

  scorecard:
    uses: honua-io/.github/.github/workflows/reusable-scorecard.yml@main
