name: docs

# Builds the MkDocs Material site on every PR (`mkdocs build --strict`) and,
# on `trunk` pushes, deploys a versioned copy to GitHub Pages using `mike`.
#
# Deploy approach (mike + GitHub Pages):
#
#   * The `build` job runs the strict build on every PR + push, so broken
#     links / mkdocstrings errors block merges.
#   * The `deploy` job runs ONLY on `trunk` pushes (`if:` guard below).
#     It re-uses the same checkout and deps, then runs:
#         mike deploy --push --update-aliases latest
#     which:
#       - publishes the current build under the `latest` alias on the
#         `gh-pages` branch (mike's default deployment branch),
#       - pushes the updated `gh-pages` branch to the remote,
#       - updates the alias so `latest` always points at the most recent
#         `trunk` build.
#   * GitHub Pages serves https://honua-io.github.io/honua-sdk-python/ from
#     the `gh-pages` branch once Pages is enabled on the repo (Settings →
#     Pages → Source: `gh-pages`). The docs badge in README.md is a
#     forward link — it resolves only after the first successful deploy.
#   * Required permissions are scoped per-job: the deploy job needs
#     `contents: write` to push to `gh-pages` and `pages: write` to
#     publish via the Pages API.

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material "mkdocstrings[python]" mike
          pip install ./packages/honua-sdk[grpc,geopandas]
          pip install ./packages/honua-admin
      - name: Build site
        run: mkdocs build --strict
      - name: Upload built site
        # Attach the rendered site so PR reviewers can download and preview the
        # docs without checking out the branch and building mkdocs locally.
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-${{ github.run_id }}
          path: site/
          if-no-files-found: error
          retention-days: 14

  deploy:
    # Versioned docs publish only from `trunk` pushes, never from PR forks.
    if: github.ref == 'refs/heads/trunk' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # mike needs the full history of `gh-pages` to update aliases
          # without overwriting prior versioned builds.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material "mkdocstrings[python]" mike
          pip install ./packages/honua-sdk[grpc,geopandas]
          pip install ./packages/honua-admin
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy versioned docs (mike → gh-pages)
        run: mike deploy --push --update-aliases latest
