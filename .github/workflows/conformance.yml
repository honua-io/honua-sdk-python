name: Python SDK Conformance

# Blocking live-server conformance lane (issue #81, epic geospatial-grpc#18 —
# the cross-repo Compatibility Train). It runs the *shared* geospatial-grpc
# conformance fixtures against a PINNED honua-server:nightly through the httpx
# clients (HonuaClient / AsyncHonuaClient) and fails on contract drift.
#
# Unlike the scheduled, advisory staging-integration lane, this job runs on
# every pull_request and push to trunk and is intended to be a required check.

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  # Shared geospatial-grpc fixture pin (must equal conformance/FIXTURES_VERSION).
  # The fetch helper verifies the bundle's embedded VERSION equals this value.
  CONFORMANCE_FIXTURES_VERSION: "0.1.0-alpha.1"
  # Immutable, date-pinned nightly tag (records the exact server the contract is
  # certified against; the job moves only when this pin moves, so drift is
  # attributable). Resolved digest + revision are recorded in the step summary.
  HONUA_SERVER_IMAGE: "ghcr.io/honua-io/honua-server:nightly-20260530-amd64"

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: packages/honua-sdk/pyproject.toml

      - name: Install honua-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/honua-sdk
          pip install pytest

      - name: Verify fixture pin matches conformance/FIXTURES_VERSION
        run: |
          set -euo pipefail
          pinned="$(tr -d '[:space:]' < conformance/FIXTURES_VERSION)"
          if [[ "${pinned}" != "${CONFORMANCE_FIXTURES_VERSION}" ]]; then
            echo "::error::conformance/FIXTURES_VERSION (${pinned}) != workflow pin (${CONFORMANCE_FIXTURES_VERSION})"
            exit 1
          fi
          echo "Fixture pin: ${pinned}"

      - name: Fetch pinned shared conformance fixtures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./conformance/fetch-fixtures.sh \
            --version "${CONFORMANCE_FIXTURES_VERSION}" \
            --repo honua-io/geospatial-grpc \
            --dest "${GITHUB_WORKSPACE}/conformance-fixtures-${CONFORMANCE_FIXTURES_VERSION}"
          echo "HONUA_CONFORMANCE_FIXTURES_DIR=${GITHUB_WORKSPACE}/conformance-fixtures-${CONFORMANCE_FIXTURES_VERSION}" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Checkout Honua Server seed fixtures
        uses: actions/checkout@v6
        with:
          repository: honua-io/honua-server
          path: honua-server

      - name: Start seeded pinned Honua target
        env:
          COMPOSE_PROJECT_NAME: honua-python-conformance-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          server_root="${GITHUB_WORKSPACE}/honua-server"
          compose_file="${server_root}/docker/client-compat/compose.yml"
          override_file="${RUNNER_TEMP}/python-conformance-compose.override.yml"

          # Override the one-shot seed to apply the canonical client-compat seed
          # (schema + test_service / layer 0 with JSONB feature attributes — the
          # honua-server#1238 path) and pin honua to the immutable nightly tag.
          #
          # ASPNETCORE_ENVIRONMENT=Development matches the metadata-v2 snapshot
          # the seed activates (it activates 'default'/'Development'/'Test', not
          # 'Production'); without this the server 500s with "No Metadata v2
          # snapshot has been activated for environment 'Production'".
          cat > "${override_file}" <<YAML
          services:
            seed:
              image: client-compat-seed:latest
              entrypoint:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "Waiting for postgres postgres:5432..."
                  for attempt in \$(seq 1 30); do
                    if pg_isready -h postgres -p 5432 -U postgres >/dev/null 2>&1; then
                      break
                    fi
                    sleep 2
                  done
                  echo "Applying conformance seed: tests/seed/client-compat-v1.sql"
                  psql -v ON_ERROR_STOP=1 -f tests/seed/client-compat-v1.sql
                  echo "Conformance seed complete."
            honua:
              image: ${HONUA_SERVER_IMAGE}
              ports:
                - "5000:5000"
              environment:
                ASPNETCORE_ENVIRONMENT: Development
                PUBLIC_BASE_URL: http://localhost:5000
          YAML

          docker pull "${HONUA_SERVER_IMAGE}"
          docker build \
            -t client-compat-seed:latest \
            -f "${server_root}/docker/client-compat/seed/Dockerfile" \
            "${server_root}"

          docker compose -f "${compose_file}" -f "${override_file}" up -d --no-build honua

          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:5000/healthz/ready >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:5000/healthz/ready >/dev/null

          image_digest="$(docker image inspect "${HONUA_SERVER_IMAGE}" --format '{{ index .RepoDigests 0 }}' 2>/dev/null || true)"
          image_revision="$(docker image inspect "${HONUA_SERVER_IMAGE}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' 2>/dev/null || true)"

          {
            echo "HONUA_BASE_URL=http://localhost:5000"
            echo "HONUA_SERVICE_ID=test_service"
            echo "HONUA_LAYER_ID=0"
            echo "HONUA_API_KEY=ClientCompatAdmin123!"
            if [[ -n "${image_revision}" && "${image_revision}" != "<no value>" ]]; then
              echo "HONUA_SERVER_COMMIT=${image_revision}"
            fi
          } >> "${GITHUB_ENV}"

          {
            echo "## Python SDK live-server conformance — pinned target"
            echo "- Server image: \`${HONUA_SERVER_IMAGE}\`"
            if [[ -n "${image_digest}" ]]; then
              echo "- Resolved digest: \`${image_digest}\`"
            fi
            if [[ -n "${image_revision}" && "${image_revision}" != "<no value>" ]]; then
              echo "- Image revision: \`${image_revision}\`"
            fi
            echo "- Fixture set: \`${CONFORMANCE_FIXTURES_VERSION}\` (geospatial-grpc shared fixtures)"
            echo "- Base URL: \`http://localhost:5000\` (service \`test_service\`, layer \`0\`)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run shared-fixture conformance suite
        env:
          HONUA_CONFORMANCE_SUMMARY_PATH: conformance-summary.md
        run: |
          python -m pytest tests/conformance \
            -q \
            --run-integration \
            -m "integration and conformance" \
            -rsxX \
            --tb=short \
            --junitxml=conformance-junit.xml

      - name: Append case results to step summary
        if: ${{ always() }}
        run: |
          if [[ -f conformance-summary.md ]]; then
            cat conformance-summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload conformance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-sdk-conformance-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            conformance-junit.xml
            conformance-summary.md

      - name: Upload server diagnostics
        if: ${{ always() }}
        env:
          COMPOSE_PROJECT_NAME: honua-python-conformance-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          server_root="${GITHUB_WORKSPACE}/honua-server"
          compose_file="${server_root}/docker/client-compat/compose.yml"
          override_file="${RUNNER_TEMP}/python-conformance-compose.override.yml"
          docker compose -f "${compose_file}" -f "${override_file}" logs --no-color > conformance-server.log || true

      - name: Upload server log artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-sdk-conformance-server-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: conformance-server.log

      - name: Stop seeded target
        if: ${{ always() }}
        env:
          COMPOSE_PROJECT_NAME: honua-python-conformance-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          server_root="${GITHUB_WORKSPACE}/honua-server"
          compose_file="${server_root}/docker/client-compat/compose.yml"
          override_file="${RUNNER_TEMP}/python-conformance-compose.override.yml"
          docker compose -f "${compose_file}" -f "${override_file}" down -v || true
