name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run build and validation only (skip publish)"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "python-sdk-v*"

env:
  PYTHON_VERSION: "3.11"

jobs:
  publish-python-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[grpc]"
          pip install pytest hatch twine

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --strict || {
            echo "::warning::pip-audit found vulnerabilities. Review before publishing."
          }

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Validate tag version
        if: github.event_name == 'push'
        run: |
          package_version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          tag_version="${GITHUB_REF_NAME#python-sdk-v}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) does not match pyproject.toml version ($package_version)."
            exit 1
          fi

      - name: Build package
        run: hatch build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-sdk-dist-${{ github.run_id }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish to PyPI
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${TWINE_PASSWORD}" ]]; then
            echo "PYPI_API_TOKEN secret is required for publishing."
            exit 1
          fi
          twine upload --skip-existing dist/*

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete. Built artifacts:"
          ls -la dist/
